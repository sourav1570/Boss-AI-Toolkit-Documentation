site_name: DOCUMENTATION
site_url: https://sourav1570.github.io/Boss-AI-Toolkit-Documentation/
nav:
  - MOBILE ACTION KIT:
    - Get Started: index.md
    - Player:
       - test: index.md
    - Shop: index.md
  - SUPPORT: index.md
docs_dir: docs
use_directory_urls: false
theme:
  name: material
  logo: Images/Logo.png
  favicon: Images/Logo.png
  nav_style: default
  features:
    - navigation.tabs
    - search.highlight
    - content.tabs.link
    - content.code.annotation
    - content.copy.code
    - prev_next_buttons
  language: en
  palette:
    - scheme: default
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
      primary: white
      accent: white
    - scheme: slate
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
      primary: black
      accent:  black
plugins:
  - search
extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.com/invite/BeGy5hhyNj
    - icon: fontawesome/solid/envelope
      link: https://mail.google.com/
copyright: |
